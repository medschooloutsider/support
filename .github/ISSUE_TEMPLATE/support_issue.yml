name: Support issue
description: Public issue report for GPT-MD, PDF-MD, or Alarmist
title: "[App]: "
labels:
  - support
body:
  - type: markdown
    attributes:
      value: |
        Use this for public issues only. Do not include license keys, private documents, medical records, screenshots with personal information, or full diagnostic logs.
  - type: dropdown
    id: app
    attributes:
      label: App
      options:
        - GPT-MD
        - PDF-MD
        - Alarmist
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Bug
        - Bad output
        - Missing feature
        - Purchase or access issue
        - Safety concern
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Keep this public-safe. If the app gave you a private report ID, include only that ID.
      placeholder: "Example: PDF-MD export failed after selecting a Markdown file. Private report ID: ..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version, if known
      placeholder: "Example: 1.2.3"
    validations:
      required: false
  - type: input
    id: report_id
    attributes:
      label: Private report ID, if the app gave you one
      placeholder: "Example: 6b58f2d8-..."
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have not included license keys, private documents, medical records, or full diagnostic logs.
          required: true
